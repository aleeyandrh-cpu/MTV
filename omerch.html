    <main class="merch-detail-container inverted">
        
        <div class="merch-detail-left-text">
            <h1 class="merch-title">Don't Look Back in Anger Decca Logo Carnation Tee</h1>
<div class="merch-price">RM 60</div>

<!-- Tambah bahagian teks deskripsi ini jika belum ada -->

<!-- Pilihan Saiz (XS - XXL) -->
<div class="size-section">
    <div class="size-options">
        <button class="size-box" onclick="selectSize(this)">XS</button>
        <button class="size-box active-size" onclick="selectSize(this)">S</button>
        <button class="size-box" onclick="selectSize(this)">M</button>
        <button class="size-box" onclick="selectSize(this)">L</button>
        <button class="size-box" onclick="selectSize(this)">XL</button>
        <button class="size-box" onclick="selectSize(this)">XXL</button>
    </div>
</div>

            <div class="merch-quantity-section">
                <span class="merch-quantity-label">Quantity</span>
                <div class="merch-quantity-selector">
                    <button class="merch-qty-btn" onclick="decreaseMerchQty()">-</button>
                    <span id="merch-qty-number">1</span>
                    <button class="merch-qty-btn" onclick="increaseMerchQty()">+</button>
                </div>
            </div>

            <button class="merch-add-cart-btn" onclick="addMerchToCart()">ADD TO CART</button>
            
            <div class="merch-brand-tag">OASIS</div>
        </div>

        <div class="merch-detail-right-image">
            <div class="merch-main-image">
                <img src="c:\Users\User\Documents\uitm\website individu\img\o shirt.png" alt="In Utero Graphic Tee">
            </div>
        </div>

    </main>

    <script>
    let qty = 1;
    let selectedSize = "S";

    function increaseMerchQty() {
        qty++;
        document.getElementById('merch-qty-number').innerText = qty;
    }

    function decreaseMerchQty() {
        if (qty > 1) {
            qty--;
            document.getElementById('merch-qty-number').innerText = qty;
        }
    }

    function selectSize(element) {
        const sizeBoxes = document.querySelectorAll('.size-box');
        sizeBoxes.forEach(box => box.classList.remove('active-size'));
        element.classList.add('active-size');
        selectedSize = element.innerText;
    }

    // FUNGSI UTAMA: Simpan item ke dalam LocalStorage apabila butang ditekan
    function addMerchToCart() {
    // Ambil nama baju dari tajuk halaman omerch.html anda
    const merchTitle = document.querySelector('.merch-title').innerText;

    const newMerchItem = {
        // PENTING: Format ID mesti konsisten 'merch-' supaya fungsi tambah/tolak/buang di cart.html kenal item ini
        id: 'merch-' + merchTitle.toLowerCase().replace(/\s+/g, '-') + '-' + selectedSize.toLowerCase(),
        title: merchTitle,
        subtitle: 'Adult Short Sleeve Tshirt',
        price: 60.00, // Harga shop merch tetap RM60
        image: "img/o merch.png", // Sila pastikan jalan fail gambar ini betul
        qty: qty, // Mengambil nilai dari kaunter halaman omerch anda
        size: selectedSize // Mengambil saiz yang dipilih
    };

    let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
    const existingIndex = cart.findIndex(item => item.id === newMerchItem.id);

    if (existingIndex > -1) {
        // Jika baju & saiz yang sama sudah ada, tambahkan kuantiti baharu
        cart[existingIndex].qty += qty;
    } else {
        // Jika belum ada, masukkan dalam troli
        cart.push(newMerchItem);
    }

    localStorage.setItem('shoppingCart', JSON.stringify(cart));
    alert("Berjaya menambah " + qty + " helai baju ke dalam troli!");
}

// Fungsi mengesan jika user tekan butang Enter pada keyboard
function checkSearchEnter(event) {
    if (event.key === "Enter") {
        triggerSearch();
    }
}

// Fungsi menghantar kata kunci carian ke halaman shop/event
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim().toLowerCase();
    if (query !== "") {
        // Bawa user ke page shop bersama parameter carian (contoh: shop.html?search=nirvana)
        window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
    }
}
