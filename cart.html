<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTV - Your Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-left">
            <a href="index.html" class="logo-link">
                <img class="logo" src="img/logo.png" alt="MTV Logo">
            </a>
            <nav class="nav-links">
                <a href="event.html">event</a>
                <a href="shop.html">shop</a>
            </nav>
        </div>
        <div class="nav-right">
            <a href="cart.html" class="active-cart">
                <svg class="bag-icon" viewBox="0 0 24 24">
                    <path d="M18 6h-2c0-2.21-1.79-4-4-4S8 3.79 8 6H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6-2c1.1 0 2 .9 2 2H10c0-1.1-.9-2 2-2zm6 16H6V8h2v2c0 .55.45 1 1 1s1-.45 1-1V8h4v2c0 .55.45 1 1 1s1-.45 1-1V8h2v12z"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="cart-page-container">
        
        <div class="cart-header-row">
            <h1 class="cart-page-title">Your Cart</h1>
            <a href="shop.html" class="continue-shopping-btn">Continue Shopping</a>
        </div>

        <div class="cart-table">
            <div class="cart-table-header">
                <div class="header-prod">Product</div>
                <div class="header-qty">Quantity</div>
                <div class="header-tot">Total</div>
            </div>

            <div id="cart-items-container"></div>
        </div>

        <div class="cart-summary-footer">
            <button class="checkout-btn" onclick="proceedToCheckout()">Check Out</button>
            <div class="total-price-box">
                <div class="est-row">
                    <span class="est-label">Estimated total</span>
                    <span class="est-value">RM <span id="cart-estimated-total">0.00</span></span>
                </div>
                <p class="tax-note">Taxes, discounts and shipping calculated at checkout.</p>
            </div>
        </div>

    </main>

    <script>
        function renderCart() {
            const container = document.getElementById('cart-items-container');
            if (!container) return; // Mencegah ralat jika tersalah id kontainer
            
            container.innerHTML = ''; 

            // Ambil data terus dari localStorage (sama macam checkout.html)
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];

            if (cart.length === 0) {
                container.innerHTML = '<p style="color:#aaa; padding: 40px 0; text-align:left; font-size:14px;">Troli anda kosong.</p>';
                document.getElementById('cart-estimated-total').innerText = '0.00';
                return;
            }

            let grandTotal = 0;

            cart.forEach((item) => {
                const itemTotal = item.price * item.qty;
                grandTotal += itemTotal;

                const sizeHTML = item.size ? `<span class="cart-item-size">Size : ${item.size}</span>` : '';
                const subtitleHTML = item.subtitle ? `<p class="cart-item-subtitle">${item.subtitle}</p>` : '';

                // Memastikan susun atur class HTML adalah tepat dengan style.css anda
                const itemRow = `
                    <div class="cart-item">
                        <div class="cart-prod-col">
                            <div class="cart-img-box">
                                <img src="${item.image}" alt="${item.title}">
                            </div>
                            <div class="cart-prod-details">
                                <h2 class="cart-item-title">${item.title}</h2>
                                ${subtitleHTML}
                                <span class="cart-item-price">RM ${item.price.toFixed(2)}</span>
                                ${sizeHTML}
                            </div>
                        </div>
                        <div class="cart-qty-col">
                            <div class="cart-qty-selector">
                                <button class="cart-qty-btn" onclick="changeQuantity('${item.id}', -1)">-</button>
                                <span class="item-qty-value">${item.qty}</span>
                                <button class="cart-qty-btn" onclick="changeQuantity('${item.id}', 1)">+</button>
                            </div>
                            <svg class="delete-icon" onclick="deleteItem('${item.id}')" viewBox="0 0 24 24" style="width:24px; height:24px; cursor:pointer; margin-left:15px; fill:#fff;">
                                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                            </svg>
                        </div>
                        <div class="cart-total-col">
                            RM <span class="item-total-value">${itemTotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
                container.innerHTML += itemRow;
            });

            document.getElementById('cart-estimated-total').innerText = grandTotal.toFixed(2);
        }

        function changeQuantity(id, change) {
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
            const itemIndex = cart.findIndex(item => item.id === id);

            if (itemIndex > -1) {
                cart[itemIndex].qty += change;
                if (cart[itemIndex].qty < 1) return; // Kuantiti minimum 1
                
                localStorage.setItem('shoppingCart', JSON.stringify(cart));
                renderCart(); // Segarkan halaman cart secara langsung
            }
        }

        function deleteItem(id) {
            if (confirm("Adakah anda ingin membuang item ini dari troli?")) {
                let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
                cart = cart.filter(item => item.id !== id);
                localStorage.setItem('shoppingCart', JSON.stringify(cart));
                renderCart();
            }
        }

        function proceedToCheckout() {
            let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];
            if (cart.length === 0) {
                alert("Troli anda kosong!");
                return;
            }
            window.location.href = "checkout.html";
        }

        window.onload = renderCart;

        // Fungsi mengesan jika user tekan butang Enter pada keyboard
function checkSearchEnter(event) {
    if (event.key === "Enter") {
        triggerSearch();
    }
}

// Fungsi menghantar kata kunci carian ke halaman shop/event
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim().toLowerCase();
    if (query !== "") {
        // Bawa user ke page shop bersama parameter carian (contoh: shop.html?search=nirvana)
        window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
    }
}
    </script>
