    <script>// Fungsi mengesan jika user tekan butang Enter pada keyboard
function checkSearchEnter(event) {
    if (event.key === "Enter") {
        triggerSearch();
    }
}

// Fungsi menghantar kata kunci carian ke halaman shop/event
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim().toLowerCase();
    if (query !== "") {
        // Bawa user ke page shop bersama parameter carian (contoh: shop.html?search=nirvana)
        window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
    }
}
function applySearchFilter() {
    // 1. Ambil kata kunci dari URL browser
    const urlParams = new URLSearchParams(window.location.search);
    const searchQuery = urlParams.get('search');

    if (searchQuery) {
        const query = searchQuery.toLowerCase().trim();
        
        // Letakkan teks carian semula ke dalam kotak input search bar
        if (document.getElementById('search-input')) {
            document.getElementById('search-input').value = searchQuery;
        }

        // 2. CARI KOTAK PRODUK SECARA AUTOMATIK:
        // Kita cari semua elemen <a> atau <div> yang membungkus gambar produk di dalam <main> atau section kedai anda
        const products = document.querySelectorAll('main a, .shop-container a, .grid-container > div, .products-grid > div');

        let adaItemDijumpai = false;

        products.forEach(product => {
            // Ambil semua teks yang ada di dalam kotak produk tersebut (Nama, Harga, Kumpulan, dll)
            const productText = product.innerText.toLowerCase();
            
            // Juga ambil text dari atribut alt gambar jika ada
            const imgAlt = product.querySelector('img')?.getAttribute('alt')?.toLowerCase() || "";

            // 3. SEPADANKAN: Jika teks produk atau alt gambar mengandungi kata kunci carian
            if (productText.includes(query) || imgAlt.includes(query)) {
                // Tunjukkan produk (pastikan guna jenis paparan asal, selalunya block/flex/inline-block)
                product.style.display = ""; 
                adaItemDijumpai = true;
            } else {
                // Sembunyikan produk yang tidak berkaitan
                product.style.display = "none"; 
            }
        });

        // 4. Jika langsung tak jumpa apa-apa yang sepadan, tunjuk mesej makluman
        if (!adaItemDijumpai) {
            const mainContent = document.querySelector('main') || document.body;
            const noResultDiv = document.createElement('div');
            noResultDiv.id = "no-search-result";
            noResultDiv.innerHTML = `<p style="color: #aaa; text-align: center; padding: 40px; font-family: sans-serif;">Maaf, tiada item ditemui untuk carian "${searchQuery}".</p>`;
            
            // Padam mesej lama jika ada sebelum letak yang baru
            document.getElementById('no-search-result')?.remove();
            mainContent.appendChild(noResultDiv);
        }
    }
}

// Jalankan penapis sebaik sahaja halaman shop dimuatkan sepenuhnya
window.addEventListener('DOMContentLoaded', applySearchFilter);
</script>
