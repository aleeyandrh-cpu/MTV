<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTV - Checkout</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Gaya tambahan khusus untuk susun atur Checkout mengikut gambar */
        .checkout-container {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            gap: 60px;
            color: #ffffff;
            font-family: sans-serif;
        }
        .checkout-left {
            flex: 1.2;
        }
        .checkout-right {
            flex: 0.8;
            border-left: 1px solid #222;
            padding-left: 40px;
        }
        .checkout-section {
            margin-bottom: 30px;
        }
        .checkout-section h2 {
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-row input, .input-row select {
            flex: 1;
        }
        .checkout-input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        /* Item Ringkasan Kanan */
        .checkout-summary-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .summary-prod-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .summary-img-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            background: #111;
            border: 1px solid #333;
        }
        .summary-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .summary-qty-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #666;
            color: #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
        .summary-details h3 {
            font-size: 14px;
            margin: 0 0 5px 0;
        }
        .summary-details p {
            font-size: 12px;
            color: #aaa;
            margin: 0;
        }
        .price-lines {
            margin-top: 30px;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .price-row.total-line {
            font-size: 18px;
            font-weight: bold;
            border-top: 1px solid #222;
            padding-top: 15px;
            margin-top: 15px;
        }
        .pay-now-btn {
            width: 100%;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 15px;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        .pay-now-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>

                <img class="logo" src="img/logo.png" alt="MTV Logo">
            </a>

                <a href="event.html">event</a>
                <a href="shop.html">shop</a>
            </nav>

                </svg>

    </header>

    <main class="checkout-container">
    
    <div class="checkout-left">
        
        <h1 style="color: #ffffff; font-family: sans-serif; font-size: 36px; margin: 0 0 30px 0; text-align: left; font-weight: bold;">Checkout</h1>
        
        <div class="checkout-section">
            <h2>Contact</h2>
            <div class="input-group">
                <input type="email" class="checkout-input" placeholder="Email">
            </div>
        </div>

        <div class="checkout-section">
            <h2>Delivery</h2>
            <div class="input-group">
                <select class="checkout-input">
                    <option value="Malaysia">Malaysia</option>
                    <option value="Singapore">Singapore</option>
                </select>
            </div>
            <div class="input-row">
                <input type="text" class="checkout-input" placeholder="First Name">
                <input type="text" class="checkout-input" placeholder="Last Name">
            </div>
            <div class="input-group">
                <input type="text" class="checkout-input" placeholder="Address">
            </div>
            <div class="input-row">
                <input type="text" class="checkout-input" placeholder="City">
                <input type="text" class="checkout-input" placeholder="State">
                <input type="text" class="checkout-input" placeholder="ZIP Code">
            </div>
            <div class="input-group">
                <input type="tel" class="checkout-input" placeholder="Phone">
            </div>
        </div>

        <div class="checkout-section">
            <h2>Payment</h2>
            <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">All transactions are secure and encrypted.</p>
            <div style="border: 1px solid #444; padding: 15px; background: #050505; border-radius: 4px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <label style="font-weight: bold; font-size: 14px;">💳 Credit Card</label>
                    <span style="font-size: 12px; color: #888;">Visa / Mastercard</span>
                </div>
                <div class="input-group">
                    <input type="text" class="checkout-input" placeholder="Card Number">
                </div>
                <div class="input-row">
                    <input type="text" class="checkout-input" placeholder="Expiration Date (MM/YY)">
                    <input type="text" class="checkout-input" placeholder="Security Code">
                </div>
                <div class="input-group">
                    <input type="text" class="checkout-input" placeholder="Name on card">
                </div>
            </div>
        </div>

    </div>

    <div class="checkout-right">
        <div id="checkout-items-list"></div>
        <div class="price-lines">
            <div class="price-row">
                <span style="color: #aaa;">Subtotal</span>
                <span>RM <span id="checkout-subtotal">0.00</span></span>
            </div>
            <div class="price-row">
                <span style="color: #aaa;">Shipping</span>
                <span id="shipping-status">*Enter shipping address</span>
            </div>
            <div class="price-row total-line">
                <span>Total</span>
                <span>RM <span id="checkout-grand-total">0.00</span></span>
            </div>
        </div>
        <button class="pay-now-btn" onclick="submitPayment()">Pay Now</button>
    </div>

    <script>
        function loadCheckoutData() {
    const listContainer = document.getElementById('checkout-items-list');
    listContainer.innerHTML = '';

    // Ambil data terus dari localStorage
    let cart = JSON.parse(localStorage.getItem('shoppingCart')) || [];

    if (cart.length === 0) {
        listContainer.innerHTML = '<p style="color: #aaa;">Tiada barangan untuk dibayar.</p>';
        document.getElementById('checkout-subtotal').innerText = '0.00';
        document.getElementById('shipping-status').innerText = 'RM 0.00';
        document.getElementById('checkout-grand-total').innerText = '0.00';
        return;
    }

    let subtotal = 0;
    let mempunyaiMerch = false; // Penanda untuk semak jika ada baju dalam troli

    cart.forEach((item) => {
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;

        // Semak jika ID item bermula dengan 'merch-' (iaitu baju dari shop)
        if (item.id && item.id.startsWith('merch-')) {
            mempunyaiMerch = true;
        }

        const sizeText = item.size ? `${item.size}` : '';

        const itemHTML = `
            <div class="checkout-summary-item">
                <div class="summary-prod-info">
                    <div class="summary-img-wrapper">
                        <img src="${item.image}" alt="${item.title}">
                        <div class="summary-qty-badge">${item.qty}</div>
                    </div>
                    <div class="summary-details">
                        <h3>${item.title}</h3>
                        <p>${item.subtitle}</p>
                        <p style="font-size: 11px; color: #fff; margin-top: 2px;">${sizeText}</p>
                    </div>
                </div>
                <div style="font-weight: 500; font-size: 14px;">
                    RM ${itemTotal.toFixed(2)}
                </div>
            </div>
        `;
        listContainer.innerHTML += itemHTML;
    });

    // LOGIK SHIPPING AUTOMATIK:
    // Jika ada merch baju, shipping RM8. Jika tiada (hanya ada tiket event), shipping RM0.
    let shippingCost = mempunyaiMerch ? 8.00 : 0.00;
    
    // Kira jumlah keseluruhan (Subtotal + Shipping)
    let grandTotal = subtotal + shippingCost;

    // Kemas kini paparan harga di skrin supaya semuanya tally
    document.getElementById('checkout-subtotal').innerText = subtotal.toFixed(2);
    
    // Paparkan harga shipping (RM 8.00 atau RM 0.00) menggantikan teks "*Enter shipping address"
    document.getElementById('shipping-status').innerText = "RM " + shippingCost.toFixed(2);
    
    // Paparkan jumlah keseluruhan yang tepat
    document.getElementById('checkout-grand-total').innerText = grandTotal.toFixed(2);
}

function submitPayment() {
    const finalTotal = document.getElementById('checkout-grand-total').innerText;
    alert("🔒 Pembayaran anda berjaya diproses dengan jumlah: RM " + finalTotal + "! Terima kasih kerana membeli di MTV.");
    localStorage.removeItem('shoppingCart'); // Kosongkan cart selepas berjaya beli
    window.location.href = "index.html"; // Balik ke main page
}

// Jalankan fungsi sebaik sahaja page checkout dibuka
window.onload = loadCheckoutData;

// Fungsi mengesan jika user tekan butang Enter pada keyboard
function checkSearchEnter(event) {
    if (event.key === "Enter") {
        triggerSearch();
    }
}

// Fungsi menghantar kata kunci carian ke halaman shop/event
function triggerSearch() {
    const query = document.getElementById('search-input').value.trim().toLowerCase();
    if (query !== "") {
        // Bawa user ke page shop bersama parameter carian (contoh: shop.html?search=nirvana)
        window.location.href = `shop.html?search=${encodeURIComponent(query)}`;
    }
}
    </script>
